name: Agent Eval

on:
  pull_request:
  push:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      MIN_CONTRACT_PASS_RATE: "0.95"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run agent evaluation harness
        run: |
          cold-ai eval-agents --output data/exports/agent_eval_report.json

      - name: Enforce contract quality gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("data/exports/agent_eval_report.json")
          if not report_path.exists():
              raise SystemExit("Missing evaluation report")

          report = json.loads(report_path.read_text(encoding="utf-8"))
          summary = report.get("summary") or {}
          pass_rate = float(summary.get("contract_pass_rate") or 0.0)
          min_rate = float("${MIN_CONTRACT_PASS_RATE}")

          print(f"contract_pass_rate={pass_rate:.3f}")
          print(f"required_min_rate={min_rate:.3f}")

          if pass_rate < min_rate:
              raise SystemExit(
                  f"Contract pass rate {pass_rate:.3f} is below minimum {min_rate:.3f}"
              )
          PY

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-report
          path: data/exports/agent_eval_report.json
